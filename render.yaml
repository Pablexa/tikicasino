services:
  - type: web
    name: tikicasino
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install && npx prisma generate"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        value: "tiki-casino-caldicoins-secret-2025-xk9p2qm7"
      - key: COOKIE_SECRET
        value: "tiki-cookie-caldis-queque-mango-toilet-2025"
