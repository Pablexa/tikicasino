services:
  - type: web
    name: tikicasino
    env: node
    region: oregon
    plan: free
    buildCommand: |
      cd client && npm install && npm run build
      cd ../server && npm install && npx prisma generate
      mkdir -p server/public && cp -r client/dist/* server/public/
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./prod.db
