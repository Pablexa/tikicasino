services:
  - type: web
    name: tikicasino
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install && npx prisma generate && mkdir -p public && cp -r ../client/dist/. public/"
    startCommand: "cd server && node src/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "file:./prisma/prod.db"
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
